gitlab:
  url: https://gitlab.example.com
  service_account_token: glpat-test
  mock: true

admins:
  - alice@company.com
  - cergfix@gmail.com

auth:
  providers:
    - type: mock
      enabled: true
      label: "Bypass Login (Dev)"
      mock_user:
        email: bob@company.com
        groups:
          - dev-team

    - type: local
      enabled: true
      label: "Local Account"
      users:
        - email: alice@company.com
          password: admin
          groups:
            - devops-team
        - email: bob@company.com
          password: user
          groups:
            - dev-team


session:
  secret: local-dev-secret-change-me
  max_age: 86400

permissions:
  - users: [alice@company.com, bob@company.com, cergfix@gmail.com]
    projects: [42]

projects:
  - id: 42
    name: "My App"
    description: "Main service"
    pipelines:
      - name: "Deploy to Staging"
        ref: staging
        variables:
          - key: ENVIRONMENT
            value: staging
            locked: true
          - key: VERSION
            value: ""
            locked: false
            required: true
            description: "Docker image tag to deploy"

external_links:
  - label: "Grafana"
    url: "https://grafana.example.com"
  - label: "Sentry"
    url: "https://sentry.example.com"
  - label: "Wiki"
    url: "https://wiki.example.com"
