name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Server ───────────────────────────────────────────────────────────────
  server:
    name: Server — type-check, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  # ─── Client ───────────────────────────────────────────────────────────────
  client:
    name: Client — lint, type-check, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

  # ─── Docker smoke test ───────────────────────────────────────────────────
  docker-smoke-test:
    name: Docker — build, API & UI smoke tests
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: buildvalve:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write test config
        run: |
          cat > /tmp/config.yml <<'YAML'
          gitlab:
            url: https://gitlab.example.com
            service_account_token: glpat-test
            mock: true
          admins:
            - test@test.com
            - alice@company.com
          auth:
            providers:
              - type: mock
                enabled: true
                label: "Mock Login"
                mock_user:
                  email: test@test.com
                  groups: [test]
              - type: local
                enabled: true
                label: "Local Login"
                users:
                  - email: alice@company.com
                    password: secret123
                    groups: [devops]
                  - email: noaccess@company.com
                    password: pass456
          session:
            secret: smoke-test-secret-1234
            max_age: 3600
          projects:
            - id: 1
              name: Test Project
              description: A test project
              pipelines:
                - name: Deploy
                  ref: main
                  variables: []
          permissions:
            - users: [test@test.com, alice@company.com]
              projects: [1]
          external_links:
            - label: Grafana
              url: https://grafana.example.com
            - label: Wiki
              url: https://wiki.example.com
          YAML

      - name: Start container
        run: |
          docker run -d --name smoke \
            -v /tmp/config.yml:/app/config/config.yml:ro \
            -e NODE_ENV=test \
            -p 3000:3000 \
            buildvalve:smoke-test

          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Server failed to start"
              docker logs smoke
              exit 1
            fi
            sleep 1
          done

      # ── API smoke tests (curl) ──────────────────────────────────────────
      - name: "API: public endpoints"
        run: |
          echo "--- GET /api/health ---"
          HEALTH=$(curl -sf http://localhost:3000/api/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'
          echo "$HEALTH" | grep -q '"mock"'

          echo "--- GET /api/auth/providers ---"
          PROVIDERS=$(curl -sf http://localhost:3000/api/auth/providers)
          echo "$PROVIDERS"
          echo "$PROVIDERS" | grep -q '"type":"mock"'
          echo "$PROVIDERS" | grep -q '"label":"Mock Login"'
          echo "$PROVIDERS" | grep -q '"/api/auth/mock/login"'
          echo "$PROVIDERS" | grep -q '"buttonLabel":"Sign in with Mock Login"'
          echo "$PROVIDERS" | grep -q '"type":"local"'
          echo "$PROVIDERS" | grep -q '"form":"credentials"'

      - name: "API: unauthenticated requests return 401"
        run: |
          for ENDPOINT in /api/auth/me /api/pipelines /api/pipelines/recent /api/admin/config; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3000$ENDPOINT")
            if [ "$CODE" != "401" ]; then
              echo "FAIL: $ENDPOINT returned $CODE, expected 401"
              exit 1
            fi
            echo "OK: $ENDPOINT → 401"
          done

      - name: "API: mock login flow"
        run: |
          COOKIE_JAR=$(mktemp)

          echo "--- GET /api/auth/mock/login (follow redirect) ---"
          LOGIN_CODE=$(curl -s -c "$COOKIE_JAR" -L -o /dev/null -w '%{http_code}' http://localhost:3000/api/auth/mock/login)
          echo "Login response: $LOGIN_CODE"
          [ "$LOGIN_CODE" = "200" ] || { echo "FAIL: login returned $LOGIN_CODE"; exit 1; }

          echo "--- GET /api/auth/me ---"
          ME=$(curl -sf -b "$COOKIE_JAR" http://localhost:3000/api/auth/me)
          echo "$ME"
          echo "$ME" | grep -q '"email":"test@test.com"'
          echo "$ME" | grep -q '"provider":"mock"'

          echo "$COOKIE_JAR" > /tmp/cookie_jar_path
          cp "$COOKIE_JAR" /tmp/cookies.txt

      - name: "API: authenticated pipeline endpoints"
        run: |
          CJ=/tmp/cookies.txt

          echo "--- GET /api/pipelines ---"
          PIPELINES=$(curl -sf -b "$CJ" http://localhost:3000/api/pipelines)
          echo "$PIPELINES"
          echo "$PIPELINES" | grep -q '"Test Project"'
          echo "$PIPELINES" | grep -q '"Deploy"'

          echo "--- GET /api/pipelines/recent ---"
          RECENT=$(curl -sf -b "$CJ" http://localhost:3000/api/pipelines/recent)
          echo "$RECENT"
          echo "$RECENT" | grep -q '"projectId":1'

          echo "--- POST /api/pipelines/trigger ---"
          TRIGGER=$(curl -sf -b "$CJ" -X POST http://localhost:3000/api/pipelines/trigger \
            -H 'Content-Type: application/json' \
            -d '{"projectId":1,"pipelineName":"Deploy","variables":{}}')
          echo "$TRIGGER"
          echo "$TRIGGER" | grep -q '"id"'
          PIPELINE_ID=$(echo "$TRIGGER" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "Triggered pipeline ID: $PIPELINE_ID"

          echo "--- GET /api/pipelines/1/history?ref=main ---"
          HISTORY=$(curl -sf -b "$CJ" "http://localhost:3000/api/pipelines/1/history?ref=main")
          echo "$HISTORY"

          echo "--- GET /api/pipelines/1/$PIPELINE_ID ---"
          DETAIL=$(curl -sf -b "$CJ" "http://localhost:3000/api/pipelines/1/$PIPELINE_ID")
          echo "$DETAIL"
          echo "$DETAIL" | grep -q '"pipeline"'
          echo "$DETAIL" | grep -q '"jobs"'

          # Extract a job ID for trace test
          JOB_ID=$(echo "$DETAIL" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          if [ -n "$JOB_ID" ]; then
            echo "--- GET /api/pipelines/1/jobs/$JOB_ID/trace ---"
            TRACE_CODE=$(curl -s -b "$CJ" -o /dev/null -w '%{http_code}' "http://localhost:3000/api/pipelines/1/jobs/$JOB_ID/trace")
            echo "Trace response: $TRACE_CODE"
            [ "$TRACE_CODE" = "200" ] || [ "$TRACE_CODE" = "404" ] || { echo "FAIL: unexpected $TRACE_CODE"; exit 1; }
          fi

      - name: "API: admin endpoint"
        run: |
          CJ=/tmp/cookies.txt

          echo "--- GET /api/admin/config ---"
          ADMIN=$(curl -sf -b "$CJ" http://localhost:3000/api/admin/config)
          echo "$ADMIN"
          echo "$ADMIN" | grep -q '"REDACTED"'
          echo "$ADMIN" | grep -q '"projects"'

      - name: "API: POST /api/auth/logout"
        run: |
          CJ=/tmp/cookies.txt

          echo "--- POST /api/auth/logout ---"
          LOGOUT=$(curl -sf -b "$CJ" -X POST http://localhost:3000/api/auth/logout)
          echo "$LOGOUT"
          echo "$LOGOUT" | grep -q '"ok":true'

          echo "--- Verify session is invalidated ---"
          CODE=$(curl -s -b "$CJ" -o /dev/null -w '%{http_code}' http://localhost:3000/api/auth/me)
          [ "$CODE" = "401" ] || { echo "FAIL: /api/auth/me returned $CODE after logout"; exit 1; }
          echo "OK: session invalidated after logout"

      - name: "API: local login flow"
        run: |
          echo "--- POST /api/auth/local/login with valid credentials ---"
          LOCAL_CJ=$(mktemp)
          LOGIN=$(curl -s -c "$LOCAL_CJ" -w '\n%{http_code}' -X POST http://localhost:3000/api/auth/local/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"alice@company.com","password":"secret123"}')
          CODE=$(echo "$LOGIN" | tail -1)
          BODY=$(echo "$LOGIN" | head -1)
          echo "Login response: $CODE $BODY"
          [ "$CODE" = "200" ] || { echo "FAIL: local login returned $CODE"; exit 1; }
          echo "$BODY" | grep -q '"ok":true'

          echo "--- Verify session is valid after local login ---"
          ME=$(curl -sf -b "$LOCAL_CJ" http://localhost:3000/api/auth/me)
          echo "$ME"
          echo "$ME" | grep -q '"email":"alice@company.com"'
          echo "$ME" | grep -q '"provider":"local"'

          echo "--- Verify external_links in /api/auth/me ---"
          echo "$ME" | grep -q '"externalLinks"'
          echo "$ME" | grep -q '"Grafana"'
          echo "$ME" | grep -q '"Wiki"'

          echo "--- POST /api/auth/local/login with wrong password ---"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/local/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"alice@company.com","password":"wrong"}')
          [ "$CODE" = "401" ] || { echo "FAIL: expected 401, got $CODE"; exit 1; }
          echo "OK: wrong password → 401"

          echo "--- POST /api/auth/local/login with missing fields ---"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/local/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"alice@company.com"}')
          [ "$CODE" = "400" ] || { echo "FAIL: expected 400, got $CODE"; exit 1; }
          echo "OK: missing password → 400"

          echo "--- POST /api/auth/local/login for user without permissions ---"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/local/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"noaccess@company.com","password":"pass456"}')
          [ "$CODE" = "403" ] || { echo "FAIL: expected 403, got $CODE"; exit 1; }
          echo "OK: no permissions → 403"

          rm -f "$LOCAL_CJ"

      - name: "API: authorization checks"
        run: |
          # Login fresh for auth tests
          CJ=$(mktemp)
          curl -s -c "$CJ" -L -o /dev/null http://localhost:3000/api/auth/mock/login

          echo "--- Trigger for unauthorized project returns 403 ---"
          CODE=$(curl -s -b "$CJ" -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/pipelines/trigger \
            -H 'Content-Type: application/json' \
            -d '{"projectId":999,"pipelineName":"Deploy","variables":{}}')
          [ "$CODE" = "403" ] || { echo "FAIL: expected 403, got $CODE"; exit 1; }
          echo "OK: unauthorized project → 403"

          echo "--- Trigger with missing fields returns 400 ---"
          CODE=$(curl -s -b "$CJ" -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/pipelines/trigger \
            -H 'Content-Type: application/json' \
            -d '{}')
          [ "$CODE" = "400" ] || { echo "FAIL: expected 400, got $CODE"; exit 1; }
          echo "OK: missing fields → 400"

          echo "--- Nonexistent pipeline returns 404 ---"
          CODE=$(curl -s -b "$CJ" -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/pipelines/trigger \
            -H 'Content-Type: application/json' \
            -d '{"projectId":1,"pipelineName":"NonExistent","variables":{}}')
          [ "$CODE" = "404" ] || { echo "FAIL: expected 404, got $CODE"; exit 1; }
          echo "OK: nonexistent pipeline → 404"

          rm -f "$CJ"

      # ── UI smoke tests (Selenium) ───────────────────────────────────────
      - name: Set up Chrome and Selenium
        run: |
          pip install selenium webdriver-manager

      - name: "UI: Selenium smoke tests"
        run: |
          python3 << 'PYEOF'
          import sys
          import time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from webdriver_manager.chrome import ChromeDriverManager

          BASE = "http://localhost:3000"
          failures = []

          def fail(msg):
              print(f"FAIL: {msg}")
              failures.append(msg)

          options = Options()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--disable-gpu")
          service = Service(ChromeDriverManager().install())
          driver = webdriver.Chrome(service=service, options=options)
          wait = WebDriverWait(driver, 10)

          try:
              # ── Login page ──────────────────────────────────────────────
              print("--- Login page ---")
              driver.get(BASE)
              # SPA should redirect to /login
              wait.until(EC.url_contains("/login"))
              print(f"Redirected to: {driver.current_url}")

              # Verify branding
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'BuildValve')]")))
                  print("OK: BuildValve branding visible")
              except:
                  fail("BuildValve branding not found on login page")

              # Verify both provider types are shown on login page
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//input[@type='email']")))
                  print("OK: Local login email input found")
              except:
                  fail("Local login email input not found")

              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//input[@type='password']")))
                  print("OK: Local login password input found")
              except:
                  fail("Local login password input not found")

              try:
                  mock_btn = wait.until(EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'Sign in with Mock Login')]")))
                  print(f"OK: Mock login button found: '{mock_btn.text}'")
              except:
                  fail("Mock login button not found")
                  mock_btn = None

              # Verify "or" separator between form and OAuth providers
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'or')]")))
                  print("OK: 'or' separator visible between providers")
              except:
                  fail("'or' separator not found")

              # ── Local login: wrong password ───────────────────────────
              print("--- Local login: wrong password ---")
              try:
                  email_input = driver.find_element(By.XPATH, "//input[@type='email']")
                  pass_input = driver.find_element(By.XPATH, "//input[@type='password']")
                  submit_btn = driver.find_element(By.XPATH, "//button[@type='submit']")

                  email_input.send_keys("alice@company.com")
                  pass_input.send_keys("wrongpassword")
                  submit_btn.click()

                  # Should show error message
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(@class, 'text-red')]")))
                  print("OK: Error message shown for wrong password")
              except Exception as e:
                  fail(f"Local login error test: {e}")

              # ── Local login: correct password ─────────────────────────
              print("--- Local login: correct password ---")
              try:
                  # Refresh the page to get a clean form (avoids Selenium clear() + React controlled input issues)
                  driver.get(f"{BASE}/login")
                  wait.until(EC.presence_of_element_located((By.XPATH, "//input[@type='email']")))

                  email_input = driver.find_element(By.XPATH, "//input[@type='email']")
                  pass_input = driver.find_element(By.XPATH, "//input[@type='password']")
                  email_input.send_keys("alice@company.com")
                  pass_input.send_keys("secret123")

                  submit_btn = driver.find_element(By.XPATH, "//button[@type='submit']")
                  submit_btn.click()

                  # Should redirect away from login
                  wait.until(lambda d: "/login" not in d.current_url)
                  print(f"After local login URL: {driver.current_url}")
              except Exception as e:
                  fail(f"Local login success test: {e}")

              # ── Dashboard ───────────────────────────────────────────
              print("--- Dashboard ---")
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'Test Project')]")))
                  print("OK: Project name visible on dashboard")
              except:
                  fail("Project name not found on dashboard")

              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'Deploy')]")))
                  print("OK: Pipeline name visible on dashboard")
              except:
                  fail("Pipeline name not found on dashboard")

              # ── External links in sidebar ──────────────────────────
              print("--- External links ---")
              try:
                  grafana_link = wait.until(EC.presence_of_element_located((By.XPATH, "//a[contains(text(), 'Grafana')]")))
                  href = grafana_link.get_attribute("href")
                  target = grafana_link.get_attribute("target")
                  assert href == "https://grafana.example.com", f"Grafana href wrong: {href}"
                  assert target == "_blank", f"Grafana target wrong: {target}"
                  print("OK: Grafana external link found with correct href and target")
              except Exception as e:
                  fail(f"Grafana external link: {e}")

              try:
                  wiki_link = wait.until(EC.presence_of_element_located((By.XPATH, "//a[contains(text(), 'Wiki')]")))
                  href = wiki_link.get_attribute("href")
                  assert href == "https://wiki.example.com", f"Wiki href wrong: {href}"
                  print("OK: Wiki external link found with correct href")
              except Exception as e:
                  fail(f"Wiki external link: {e}")

              # ── Navigate to pipeline launch ─────────────────────────
              print("--- Pipeline launch page ---")
              try:
                  launch_link = wait.until(EC.element_to_be_clickable(
                      (By.XPATH, "//a[contains(text(), 'Launch')] | //button[contains(text(), 'Launch')]")))
                  launch_link.click()
                  wait.until(EC.url_contains("/pipeline/"))
                  print(f"Launch page URL: {driver.current_url}")

                  wait.until(EC.presence_of_element_located(
                      (By.XPATH, "//button[contains(text(), 'Launch')] | //*[contains(text(), 'Deploy')]")))
                  print("OK: Pipeline launch page loaded")
              except Exception as e:
                  fail(f"Pipeline launch page: {e}")

              # ── Profile page ────────────────────────────────────────
              print("--- Profile page ---")
              driver.get(f"{BASE}/profile")
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'alice@company.com')]")))
                  print("OK: User email visible on profile page")
              except:
                  fail("User email not found on profile page")

              # ── Admin page ──────────────────────────────────────────
              print("--- Admin page ---")
              driver.get(f"{BASE}/admin")
              try:
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'REDACTED')]")))
                  print("OK: Admin config page shows redacted values")
              except:
                  fail("Admin config page did not show redacted values")

              # ── Logout and re-login with mock ───────────────────────
              print("--- Logout ---")
              try:
                  driver.get(BASE)
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'Pipelines')]")))
                  logout_btn = wait.until(EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'Logout')]")))
                  logout_btn.click()
                  wait.until(EC.url_contains("/login"))
                  print("OK: Logged out and redirected to login page")
              except Exception as e:
                  fail(f"Logout: {e}")

              # ── Mock login button ───────────────────────────────────
              print("--- Mock login via button ---")
              try:
                  mock_btn = wait.until(EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'Sign in with Mock Login')]")))
                  mock_btn.click()
                  wait.until(lambda d: "/login" not in d.current_url)
                  print(f"After mock login URL: {driver.current_url}")

                  # Verify mock user is logged in
                  driver.get(f"{BASE}/profile")
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'test@test.com')]")))
                  print("OK: Mock login successful, test@test.com shown on profile")
              except Exception as e:
                  fail(f"Mock login: {e}")

              # ── Error message display ───────────────────────────────
              print("--- Login page error messages ---")
              try:
                  driver.get(f"{BASE}/login?error=access_denied")
                  wait.until(EC.presence_of_element_located((By.XPATH, "//*[contains(text(), 'Access denied')]")))
                  print("OK: access_denied error message displayed")
              except Exception as e:
                  fail(f"Error message display: {e}")

          except Exception as e:
              fail(f"Unexpected error: {e}")
              print(f"Current URL: {driver.current_url}")
              print(f"Page source (first 2000 chars):\n{driver.page_source[:2000]}")
          finally:
              if failures:
                  driver.save_screenshot("/tmp/selenium-failure.png")
                  print(f"\nScreenshot saved to /tmp/selenium-failure.png")
              driver.quit()

          if failures:
              print(f"\n{'='*50}")
              print(f"{len(failures)} UI test(s) failed:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          else:
              print(f"\nAll UI smoke tests passed")
          PYEOF

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: selenium-screenshot
          path: /tmp/selenium-failure.png
          if-no-files-found: ignore

      - name: Show container logs on failure
        if: failure()
        run: docker logs smoke

      - name: Stop container
        if: always()
        run: docker stop smoke || true
